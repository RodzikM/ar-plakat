<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <script>
      AFRAME.registerComponent('outline', {
        schema: {
          color: {type: 'color', default: '#000000'},
          thickness: {type: 'number', default: 0.02} // Zmień tę wartość, by pogrubić lub pocienić obrys
        },
        init: function () {
          // Czekamy, aż model całkowicie się załaduje
          this.el.addEventListener('model-loaded', () => {
            const mesh = this.el.getObject3D('mesh');
            if (!mesh) return;

            // Tworzymy materiał shadera (odwrócona skorupa)
            const material = new THREE.ShaderMaterial({
              uniforms: {
                color: { value: new THREE.Color(this.data.color) },
                thickness: { value: this.data.thickness }
              },
              vertexShader: `
                uniform float thickness;
                void main() {
                  // Wypychamy geometrię wzdłuż jej wektorów normalnych
                  vec3 pos = position + normal * thickness;
                  gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                }
              `,
              fragmentShader: `
                uniform vec3 color;
                void main() {
                  gl_FragColor = vec4(color, 1.0);
                }
              `,
              side: THREE.BackSide // Ukrywa przód, pokazuje tylko tył (kluczowe dla obrysu!)
            });

            // Przeszukujemy model i nakładamy obrys na każdą jego część
            const outlines = [];
            mesh.traverse((node) => {
              if (node.isMesh) {
                const outline = new THREE.Mesh(node.geometry, material);
                outlines.push({parent: node, outline: outline});
              }
            });
            
            // Dodajemy wygenerowany obrys do modelu
            outlines.forEach(obj => {
              obj.parent.add(obj.outline);
            });
          });
        }
      });
    </script>

    <style>
      body {margin: 0;}
      #container {width: 100vw; height: 100vh; position: relative; overflow: hidden;}
    </style>
  </head>
  <body>
    <div id="container">
      
      <a-scene mindar-image="imageTargetSrc: targets.mind; filterMinCF: 0.001; filterBeta: 0.001;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
          <a-asset-item id="myModel" src="model.glb"></a-asset-item>
          <a-asset-item id="myModel2" src="platew.glb"></a-asset-item>
        </a-assets>
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity light="type: ambient; intensity: 0.8;"></a-entity>
        <a-entity light="type: directional; position: 0 1 1; intensity: 0.5"></a-entity>
        
        <a-entity mindar-image-target="targetIndex: 0">
          
          <a-gltf-model 
            src="#myModel" 
            position="0 0 0" 
            rotation="0 0 0" 
            scale="0.1 0.1 0.1"
            outline="color: #000000; thickness: 0.02"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 30000; easing: linear;">
          </a-gltf-model>
          
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 1">
          
          <a-gltf-model 
            src="#myModel2" 
            position="0 0 0" 
            rotation="0 0 0" 
            scale="2 2 2"
            outline="color: #000000; thickness: 0.01"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 30000; easing: linear;">
          </a-gltf-model>
          
        </a-entity>
      </a-scene>
      
    </div>
  </body>
</html>
