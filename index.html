<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body {margin: 0;}
      #container {width: 100vw; height: 100vh; position: relative; overflow: hidden;}
    </style>
  </head>
  <body>
    <div id="container">
      
      <a-scene mindar-image="imageTargetSrc: targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
          <a-asset-item id="myModel" src="model.glb"></a-asset-item>
        </a-assets>
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity light="type: ambient; intensity: 0.8;"></a-entity>
        <a-entity light="type: directional; position: 0 1 1; intensity: 0.5"></a-entity>
        
        <a-entity mindar-image-target="targetIndex: 0">
          
          <a-gltf-model src="#myModel" position="0 0 0" rotation="0 0 0" scale="0.1 0.1 0.1" >
          </a-gltf-model>
          
        </a-entity>
      </a-scene>
      
    </div>
  </body>
</html>
